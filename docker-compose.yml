services:

  streamlit:
    build: .
    container_name: sarcasm-streamlit
    ports:
      - "8501:8501"
    restart: unless-stopped

  api:
    build: .
    container_name: sarcasm-api
    command: uvicorn api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    restart: unless-stopped